<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
    <input type="checkbox" id="tema">
    <header>
        <div id='headerContenedor'>
            <div>
                <h1>MI CASA INTELIGENTE</h1>
            </div>
            <div>
                <img id="usuario" class="user" alt="Usuario">
            </div>
        </div>
    </header>
    <div id="Principal">
        <div class="caja">
            <h2>LUCES</h2>
            <img id="bombilla" class="cajaImagen" alt="Bombilla">
        </div>
        <div class="caja">
            <h2>CONSUMO ENERGETICO</h2>
            <p id="consumo">2.3KWh</p>
        </div>
        <div class="caja">
            <h2>CAMARAS</h2>
            <img id="camara" class="cajaImagen" alt="Camara">
        </div>
        <div class="caja">
            <h2>CALEFACCION</h2>
            <p id="calefaccion">22°C</p>
        </div>
        <div class="caja">
            <h2>PUERTA GARAJE</h2>
            <img id="garage" class="cajaImagen" alt="Garage">
        </div>
        <div class="caja">
            <h2>NOTIFICACIONES</h2>
            <img id="notificacion" class="cajaImagen" alt="Notificacion">
        </div>
    </div>
    <footer>
        <div id="footerContenedor">
            <div>
                <h1>MI CASA INTELIGENTE</h1>
            </div>
            <div>
                <label for="tema"><img id="claroOscuro" class="user" alt="Claro/Oscuro"></label>
            </div>
        </div>
    </footer>
</body>

</html>
